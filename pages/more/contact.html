<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="../../scripts/theme-init.js"></script>

    <link rel="stylesheet" href="../../styles/theme.css" />
    <link rel="stylesheet" href="../../styles/header.css" />
    <link rel="stylesheet" href="../../styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="/" aria-label="Home">
          <img src="../../images/logo.png" alt="pn2222a logo" />
        </a>

        <div class="header-actions">
          <nav class="menu" aria-label="Main menu">
            <details class="header-dropdown">
              <summary>Projects</summary>
              <div class="dropdown-panel">
                <a href="../projects/featured.html">Featured Projects</a>
                <a href="../projects/in-progress.html">In Progress</a>
                <a href="../projects/archive.html">Archive</a>
              </div>
            </details>

            <details class="header-dropdown">
              <summary>Links</summary>
              <div class="dropdown-panel">
                <a href="../links/index.html">GitHub</a>
                <a href="../links/index.html">Instagram</a>
                <a href="contact.html">Contact</a>
              </div>
            </details>

            <details class="header-dropdown">
              <summary>More</summary>
              <div class="dropdown-panel">
                <a href="about.html">About</a>
                <a href="blog.html">Blog</a>
                <a href="now.html">Now</a>
              </div>
            </details>
          </nav>

          <div class="theme-control">
            <button
              id="theme-toggle"
              class="theme-toggle"
              type="button"
              aria-label="Toggle theme mode"
              title="Theme: Auto"
            >
              A
            </button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <h1>Contact</h1>
      <p>Get in touch with me. I'd love to hear from you.</p>

      <section>
        <h2>Email</h2>
        <p>
          <a href="mailto:your-email@example.com">your-email@example.com</a>
        </p>
      </section>

      <section>
        <h2>Social</h2>
        <ul>
          <li><a href="#">Twitter</a></li>
          <li><a href="#">GitHub</a></li>
          <li><a href="#">Instagram</a></li>
        </ul>
      </section>

      <section>
        <h2>Contact Form</h2>
        <p>Or send me a message directly:</p>
        <form>
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="../../scripts/dropdowns.js" defer></script>
    <script src="../../scripts/theme-toggle.js" defer></script>
  </body>
</html>
